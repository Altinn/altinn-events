name: Regression test - AT

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

jobs:
  regression-tests:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env: # Shared environment vars for k6 test scripts
      altinn_env: ${{ inputs.environment }}
      tokenGeneratorUserName: ${{ secrets.TOKENGENERATOR_USERNAME }}
      tokenGeneratorUserPwd: ${{ secrets.TOKENGENERATOR_USERPASSWORD }}
      runFullTestSet: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up k6
        uses: grafana/setup-k6-action@db07bd9765aac508ef18982e52ab937fe633a065 # v1.2.1
      - name: Run app-events regression tests
        uses: grafana/run-k6-action@de51a7390bdf0ac85a3bef493691bd71d4c7c158 # v1.4.0
        with:
          path: test/k6/src/tests/app-events.js
          flags: -e app=apps-test -e userId=${{ secrets.USER_ID }} -e partyId=${{ secrets.PARTY_ID }} -e personNumber=${{ secrets.PERSON_NUMBER }}
      - name: Run events regression tests (POST)
        if: always()
        uses: grafana/run-k6-action@de51a7390bdf0ac85a3bef493691bd71d4c7c158 # v1.4.0
        with:
          path: test/k6/src/tests/events/post.js
      - name: Run events regression tests (GET)
        if: always()
        uses: grafana/run-k6-action@de51a7390bdf0ac85a3bef493691bd71d4c7c158 # v1.4.0
        with:
          path: test/k6/src/tests/events/get.js
      - name: Run subscription regression tests
        if: always()
        uses: grafana/run-k6-action@de51a7390bdf0ac85a3bef493691bd71d4c7c158 # v1.4.0
        with:
          path: test/k6/src/tests/subscriptions.js
          flags: -e app=apps-test -e webhookEndpoint=${{ secrets.WEBHOOK_ENDPOINT }}

  slack-notify:
    if: failure()
    needs: regression-tests
    uses: ./.github/workflows/send-slack-warning.yml
    permissions: {}
    with:
      warning-message: 'Events regression test failure in ${{ inputs.environment }}'
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_TEST }}
