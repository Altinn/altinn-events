name: Regression test - TT02

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * 1-5'

jobs:
  regression-tests:
    environment: TT02
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env: # Shared environment vars for k6 test scripts
      altinn_env: tt02
      runFullTestSet: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up k6
        uses: grafana/setup-k6-action@db07bd9765aac508ef18982e52ab937fe633a065 # v1.2.1
      - name: Create k6 secrets file
        id: k6-secrets
        env:
          PID: ${{ secrets.PERSON_NUMBER }}
          MP_CLIENT_ID: ${{ secrets.MP_CLIENT_ID }}
          MP_KID: ${{ secrets.MP_KID }}
          ENCODED_JWK: ${{ secrets.MP_ENCODEDJWK }}
          WEBHOOK_ENDPOINT: ${{ secrets.WEBHOOK_ENDPOINT }}
          TESTIDPPWD: ${{ secrets.TESTIDPPWD }}
        run: |
          umask 077
          SECRETS_FILE="${{ runner.temp }}/k6.secrets"
          printf 'pid=%s\n' "$PID" >> "$SECRETS_FILE"
          printf 'testidppwd=%s\n' "$TESTIDPPWD" >> "$SECRETS_FILE"
          printf 'mpClientId=%s\n' "$MP_CLIENT_ID" >> "$SECRETS_FILE"
          printf 'mpKid=%s\n' "$MP_KID" >> "$SECRETS_FILE"
          printf 'encodedJwk=%s\n' "$ENCODED_JWK" >> "$SECRETS_FILE"
          printf 'webhookEndpoint=%s\n' "$WEBHOOK_ENDPOINT" >> "$SECRETS_FILE"
          echo "file=$SECRETS_FILE" >> "$GITHUB_OUTPUT"
      - name: Run app-events regression tests
        uses: grafana/run-k6-action@de51a7390bdf0ac85a3bef493691bd71d4c7c158 # v1.4.0
        env:
          app: apps-test
        with:
          path: test/k6/src/tests/app-events.js
          flags: --secret-source=file=${{ steps.k6-secrets.outputs.file }} -e app=apps-test
      - name: Run events regression tests (POST)
        if: always()
        uses: grafana/run-k6-action@de51a7390bdf0ac85a3bef493691bd71d4c7c158 # v1.4.0
        with:
          path: test/k6/src/tests/events/post.js
          flags: --secret-source=file=${{ steps.k6-secrets.outputs.file }}
      - name: Run events regression tests (GET)
        if: always()
        uses: grafana/run-k6-action@de51a7390bdf0ac85a3bef493691bd71d4c7c158 # v1.4.0
        with:
          path: test/k6/src/tests/events/get.js
          flags: --secret-source=file=${{ steps.k6-secrets.outputs.file }}
      - name: Run subscription regression tests
        if: always()
        uses: grafana/run-k6-action@de51a7390bdf0ac85a3bef493691bd71d4c7c158 # v1.4.0
        with:
          path: test/k6/src/tests/subscriptions.js
          flags: --secret-source=file=${{ steps.k6-secrets.outputs.file }} -e app=apps-test
  slack-notify:
    if: failure()
    needs: regression-tests
    permissions: {}
    uses: ./.github/workflows/send-slack-warning.yml
    with:
      warning-message: 'Events regression test failure in tt02'
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_PROD }}
